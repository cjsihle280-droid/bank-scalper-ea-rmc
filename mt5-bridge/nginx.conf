# MT5 Bridge Startup Script for Windows
# Place this in the mt5-bridge directory and run as administrator

Write-Host "🚀 Starting MT5 Bridge Service" -ForegroundColor Green

# Check if Python is installed
try {
    $pythonVersion = python --version 2>$null
    Write-Host "✅ Python found: $pythonVersion" -ForegroundColor Green
} catch {
    Write-Host "❌ Python not found. Installing..." -ForegroundColor Red
    winget install Python.Python.3.11
}

# Create virtual environment if it doesn't exist
if (!(Test-Path "venv")) {
    Write-Host "📦 Creating virtual environment..." -ForegroundColor Yellow
    python -m venv venv
}

# Activate virtual environment and install dependencies
Write-Host "📦 Installing dependencies..." -ForegroundColor Yellow
& ".\venv\Scripts\Activate.ps1"
pip install -r requirements.txt

# Create logs directory
if (!(Test-Path "logs")) {
    New-Item -ItemType Directory -Path "logs" | Out-Null
}

# Check if MT5 is installed
$mt5Path = "${env:ProgramFiles}\MetaTrader 5\terminal64.exe"
if (!(Test-Path $mt5Path)) {
    Write-Host "⚠️  MT5 not found. Please install MT5 from https://www.metatrader5.com/en/download" -ForegroundColor Yellow
    Start-Process "https://www.metatrader5.com/en/download"
    Read-Host "Press Enter after installing MT5"
}

# Start the bridge
Write-Host "🌐 Starting MT5 Bridge on http://localhost:8000" -ForegroundColor Green
Write-Host "📊 Health check: http://localhost:8000/health" -ForegroundColor Cyan
Write-Host "🛑 Press Ctrl+C to stop" -ForegroundColor Yellow

try {
    uvicorn main:app --host 0.0.0.0 --port 8000 --reload
} catch {
    Write-Host "❌ Failed to start bridge: $_" -ForegroundColor Red
} finally {
    Write-Host "👋 Bridge stopped" -ForegroundColor Yellow
}</content>
